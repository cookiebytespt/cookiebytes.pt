<nav id="siteNav">
  <a href="{{ '/' | relative_url }}" class="nav-logo">
    {% include cookie-logo.html size=32 id="nav" %}
    CookieBytes
  </a>
  <ul class="nav-links">
    <li><a href="{{ '/' | relative_url }}#services">Services</a></li>
    <li><a href="{{ '/' | relative_url }}#about">About</a></li>
    <li><a href="{{ '/blog/' | relative_url }}"{% if page.url contains '/blog' %} class="active"{% endif %}>Blog</a></li>
    <li class="nav-social">{% include social-icons.html size=18 %}</li>
    <li><a href="{{ '/' | relative_url }}#contact" class="nav-cta">Get in touch</a></li>
  </ul>
  <div class="nav-actions">
    <div class="nav-social">{% include social-icons.html size=18 %}</div>
    <a href="{{ '/' | relative_url }}#contact" class="nav-cta">Get in touch</a>
    <button class="nav-burger" aria-label="Open menu" aria-expanded="false" onclick="toggleNavMenu(this)">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<script>
  function toggleNavMenu(btn) {
    var nav = document.getElementById('siteNav');
    var open = nav.classList.toggle('menu-open');
    btn.setAttribute('aria-expanded', open);
  }
  document.querySelectorAll('#siteNav .nav-links a').forEach(function (a) {
    a.addEventListener('click', function () {
      var nav = document.getElementById('siteNav');
      nav.classList.remove('menu-open');
      nav.querySelector('.nav-burger').setAttribute('aria-expanded', 'false');
    });
  });
</script>
